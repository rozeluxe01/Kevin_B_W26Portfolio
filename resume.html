<!DOCTYPE html>
<html>
<head>
<title>Resume</title>
<link rel="stylesheet" href="./style.css">
</head>
<script>
  document.addEventListener("DOMContentLoaded", function () {

  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");
  const closeBtn = document.querySelector(".close");

  window.openLightbox = function(img) {
    lightbox.style.display = "block";
    lightboxImg.src = img.src;
  };

  closeBtn.onclick = function () {
    lightbox.style.display = "none";
  };

  lightbox.onclick = function (e) {
    if (e.target === lightbox) {
      lightbox.style.display = "none";
    }
  };

});
</script>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="resume.html">Resume</a>
  <a href="projects.html">Projects</a>
  <a href="professional.html">Professional</a>
  <a href="contact.html" >Contact</a>
</nav>

<header>
  <h1>Resume & Cover Letter</h1>
</header>

<section class="links">
  <!-- <img src="./src/resume.jpg" onclick="openLightbox(this)"  alt="Resume image" > -->
  <img src="./src/resume.jpg" class="preview-img" onclick="openLightbox(this)" alt="Resume image">
  <br>
  <a href="./resume.pdf" target="_blank">Download Resume</a>
  <br>
  <br>
  <!-- <img src="./src/coverletter.jpg" onclick="openLightbox(this)" alt="Cover Letter image"> -->
  <img src="./src/coverletter.jpg" class="preview-img" onclick="openLightbox(this)" alt="Cover Letter image">
  <br>
  <a href="./coverletter.pdf" target="_blank">View Cover Letter</a>
</section>

<div id="lightbox" class="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">
</div>

</body>
</html>
